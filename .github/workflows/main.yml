name: Simple CI Python application

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: action/checkout@v4

      - name: Set up Python
        uses: action/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run code
        run: python app.py